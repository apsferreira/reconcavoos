# IngressRoute Traefik para stg.antoniopedro.com.br
# TLS via Cloudflare Tunnel — sem cert-manager necessário
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio-staging
  namespace: portfolio-staging
  labels:
    app: portfolio
    app.kubernetes.io/managed-by: argocd
    environment: staging
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`stg.antoniopedro.com.br`)
      kind: Rule
      services:
        - name: portfolio
          port: 80
