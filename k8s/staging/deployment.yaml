apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio-staging
  labels:
    app: portfolio
    app.kubernetes.io/managed-by: argocd
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
        environment: staging
    spec:
      containers:
        - name: portfolio
          image: ghcr.io/apsferreira/portfolio:sha-e121128
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
